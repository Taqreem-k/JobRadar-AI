databases:
  - name: job-radar-db
    databaseName: job_radar
    user: postgres
    plan: free # Change to 'starter' if you need more storage later

services:
  - type: cron
    name: job-radar-runner
    env: python
    schedule: "30 8 * * *" # Runs daily at 8:30 AM (UTC)
    buildCommand: "pip install -r requirements.txt && playwright install chromium"
    startCommand: "python app/runner.py"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-radar-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0 # Ensure this matches your local Python version